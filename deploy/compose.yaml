services:
  cal-web:
    image: danbro96/lupira-cal-web:${IMAGE_TAG:-latest}
    container_name: lupira-cal-web
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Auth__Oidc__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/lupira-cal/}
      Auth__Oidc__ClientId: ${AUTH_CLIENT_ID:-lupira-cal}
      Auth__Oidc__ClientSecret: ${AUTH_CLIENT_SECRET:-}
      ReverseProxy__Clusters__cal-api__Destinations__primary__Address: ${CAL_API_BASE_URL:-https://cal-api.lupira.com}
      DataProtection__KeyPath: /keys
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    volumes:
      - cal-web-keys:/keys
    ports:
      - "${CAL_WEB_PORT:-40881}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/livez || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - medelynas_telemetry
      - default

networks:
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
  default:
    driver: bridge

volumes:
  cal-web-keys:
